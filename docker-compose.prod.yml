services:
  venus-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: venus
      POSTGRES_USER: venus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-venus}
    volumes:
      - venus-db-data:/var/lib/postgresql/data
    networks:
      - venus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venus"]
      interval: 5s
      timeout: 5s
      retries: 10

  venus-backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://venus:${POSTGRES_PASSWORD:-venus}@venus-db:5432/venus
      VENUS_HOST: ${VENUS_HOST:-192.168.178.103}
      VENUS_PORT: ${VENUS_PORT:-80}
      PORTAL_ID: ${PORTAL_ID:-c0619ab43e45}
    depends_on:
      venus-db:
        condition: service_healthy
    networks:
      - venus-net

  venus-frontend:
    build: ./frontend
    depends_on:
      - venus-backend
    networks:
      - venus-net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.venus-frontend.rule=Host(`victron.afrinam.com`)"
      - "traefik.http.routers.venus-frontend.entrypoints=websecure"
      - "traefik.http.routers.venus-frontend.tls=true"
      - "traefik.http.routers.venus-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.venus-frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=dokploy-network"

networks:
  venus-net:
  dokploy-network:
    external: true

volumes:
  venus-db-data:
